name: Build NexPlayer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt ffmpeg cmake

      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt) ..
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: |
          chmod +x scripts/deploy_macos.sh
          ./scripts/deploy_macos.sh

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-macOS
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-multimedia-dev \
            qt6-5compat-dev \
            libqt6opengl6-dev \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-window \
            qml6-module-qt5compat-graphicaleffects \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            cmake \
            build-essential

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create desktop file
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/nexplayer.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NexPlayer
          Comment=Modern media player with audio effects
          Exec=NexPlayer
          Icon=nexplayer
          Categories=AudioVideo;Player;
          Terminal=false
          EOF

      - name: Create icon
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          sudo apt install -y imagemagick
          convert -size 256x256 xc:transparent \
            -fill "#10b981" -draw "circle 128,128 128,64" \
            -fill white -pointsize 60 -gravity center -annotate +0+0 "NP" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png

      - name: Create AppImage
        run: |
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          export QML_SOURCES_PATHS=qml
          export QMAKE=/usr/lib/qt6/bin/qmake
          
          ./linuxdeploy-x86_64.AppImage \
            --executable=build/NexPlayer \
            --desktop-file=AppDir/usr/share/applications/nexplayer.desktop \
            --icon-file=AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png \
            --appdir=AppDir \
            --plugin=qt \
            --output=appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Linux
          path: NexPlayer-*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"
          arch: "win64_msvc2019_64"
          modules: "qtmultimedia qt5compat"

      - name: Download FFmpeg
        run: |
          Write-Host "📦 Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile "ffmpeg.zip"
          
          Write-Host "📂 Extracting FFmpeg..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Rename-Item -Path "ffmpeg-master-latest-win64-gpl-shared" -NewName "ffmpeg"
          
          Write-Host "📝 Creating pkg-config files..."
          New-Item -ItemType Directory -Force -Path "ffmpeg/lib/pkgconfig" | Out-Null
          
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavcodec
          Description: FFmpeg codec library
          Version: 60.0.0
          Libs: -L`${libdir} -lavcodec
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavcodec.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavformat
          Description: FFmpeg container format library
          Version: 60.0.0
          Libs: -L`${libdir} -lavformat
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavformat.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavutil
          Description: FFmpeg utility library
          Version: 58.0.0
          Libs: -L`${libdir} -lavutil
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavutil.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswscale
          Description: FFmpeg image scaling library
          Version: 7.0.0
          Libs: -L`${libdir} -lswscale
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswscale.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswresample
          Description: FFmpeg audio resampling library
          Version: 4.0.0
          Libs: -L`${libdir} -lswresample
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswresample.pc" -Encoding ASCII
          
          Write-Host "✅ FFmpeg setup complete"

      - name: Install pkg-config
        run: |
          Write-Host "📦 Installing pkg-config..."
          choco install pkgconfiglite -y

      - name: Build
        run: |
          Write-Host "🔨 Building NexPlayer..."
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/ffmpeg/lib/pkgconfig"
          
          mkdir build
          cd build
          
          Write-Host "Running CMake..."
          cmake -G "Visual Studio 17 2022" -A x64 ..
          
          Write-Host "Compiling..."
          cmake --build . --config Release
          
          Write-Host "✅ Build complete"

      - name: Deploy Qt and FFmpeg
        run: |
          Write-Host "📦 Deploying Qt dependencies..."
          cd build/Release
          
          $qtDir = "$env:Qt6_DIR"
          $env:PATH = "$qtDir\bin;$env:PATH"
          
          Write-Host "Running windeployqt..."
          windeployqt NexPlayer.exe `
            --qmldir ../../qml `
            --no-translations `
            --release `
            --compiler-runtime 2>&1 | Out-String | Write-Host
          
          Write-Host "`n📋 Ensuring platform plugin exists..."
          
          New-Item -ItemType Directory -Force -Path "platforms" | Out-Null
          Copy-Item "$qtDir\plugins\platforms\qwindows.dll" -Destination "platforms\" -Force
          Copy-Item "$qtDir\plugins\platforms\qminimal.dll" -Destination "platforms\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$qtDir\plugins\platforms\qoffscreen.dll" -Destination "platforms\" -Force -ErrorAction SilentlyContinue
          
          if (-not (Test-Path "platforms\qwindows.dll")) {
            Write-Error "❌ Platform plugin missing!"
            exit 1
          }
          Write-Host "✅ Platform plugin confirmed"
          
          Write-Host "`nCopying image format plugins..."
          New-Item -ItemType Directory -Force -Path "imageformats" | Out-Null
          Copy-Item "$qtDir\plugins\imageformats\*.dll" -Destination "imageformats\" -Force -ErrorAction SilentlyContinue
          
          Write-Host "`nCopying QML modules..."
          New-Item -ItemType Directory -Force -Path "qml" | Out-Null
          
          if (Test-Path "$qtDir\qml\QtQuick") {
            Copy-Item -Recurse -Force "$qtDir\qml\QtQuick" -Destination "qml\" -ErrorAction SilentlyContinue
            Write-Host "✅ Copied QtQuick"
          }
          
          if (Test-Path "$qtDir\qml\Qt5Compat") {
            Copy-Item -Recurse -Force "$qtDir\qml\Qt5Compat" -Destination "qml\" -ErrorAction SilentlyContinue
            Write-Host "✅ Copied Qt5Compat"
          }
          
          if (Test-Path "$qtDir\qml\QtQml") {
            Copy-Item -Recurse -Force "$qtDir\qml\QtQml" -Destination "qml\" -ErrorAction SilentlyContinue
            Write-Host "✅ Copied QtQml"
          }
          
          if (Test-Path "$qtDir\qml\QtMultimedia") {
            Copy-Item -Recurse -Force "$qtDir\qml\QtMultimedia" -Destination "qml\" -ErrorAction SilentlyContinue
            Write-Host "✅ Copied QtMultimedia"
          }
          
          Write-Host "`n📦 Copying FFmpeg DLLs..."
          $ffmpegBin = "${{ github.workspace }}/ffmpeg/bin"
          Copy-Item "$ffmpegBin\*.dll" -Destination . -Force
          
          Write-Host "`n✅ Deployment complete"

      - name: Create Release Package
        run: |
          cd build/Release
          New-Item -ItemType Directory -Force NexPlayer-Windows
          Copy-Item NexPlayer.exe NexPlayer-Windows/
          Copy-Item *.dll NexPlayer-Windows/
          Copy-Item -Recurse platforms NexPlayer-Windows/
          Copy-Item -Recurse qml NexPlayer-Windows/
          if (Test-Path imageformats) { Copy-Item -Recurse imageformats NexPlayer-Windows/ }
          Compress-Archive NexPlayer-Windows ../../NexPlayer-Windows.zip -Force
          Write-Host "✅ ZIP created"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Windows
          path: NexPlayer-Windows.zip