name: Build NexPlayer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt ffmpeg cmake

      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt) ..
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: |
          chmod +x scripts/deploy_macos.sh
          ./scripts/deploy_macos.sh

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-macOS
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-multimedia-dev \
            qt6-5compat-dev \
            libqt6opengl6-dev \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-window \
            qml6-module-qt5compat-graphicaleffects \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            cmake \
            build-essential

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create desktop file
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/nexplayer.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NexPlayer
          Comment=Modern media player with audio effects
          Exec=NexPlayer
          Icon=nexplayer
          Categories=AudioVideo;Player;
          Terminal=false
          EOF

      - name: Create icon
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          sudo apt install -y imagemagick
          convert -size 256x256 xc:transparent \
            -fill "#10b981" -draw "circle 128,128 128,64" \
            -fill white -pointsize 60 -gravity center -annotate +0+0 "NP" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png

      - name: Create AppImage
        run: |
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          export QML_SOURCES_PATHS=qml
          export QMAKE=/usr/lib/qt6/bin/qmake
          
          ./linuxdeploy-x86_64.AppImage \
            --executable=build/NexPlayer \
            --desktop-file=AppDir/usr/share/applications/nexplayer.desktop \
            --icon-file=AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png \
            --appdir=AppDir \
            --plugin=qt \
            --output=appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Linux
          path: NexPlayer-*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"
          arch: "win64_msvc2019_64"
          modules: "qtmultimedia qt5compat"

      - name: Download FFmpeg
        run: |
          Write-Host "📦 Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile "ffmpeg.zip"
          
          Write-Host "📂 Extracting FFmpeg..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Rename-Item -Path "ffmpeg-master-latest-win64-gpl-shared" -NewName "ffmpeg"
          
          Write-Host "📝 Creating pkg-config files..."
          New-Item -ItemType Directory -Force -Path "ffmpeg/lib/pkgconfig" | Out-Null
          
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavcodec
          Description: FFmpeg codec library
          Version: 60.0.0
          Libs: -L`${libdir} -lavcodec
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavcodec.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavformat
          Description: FFmpeg container format library
          Version: 60.0.0
          Libs: -L`${libdir} -lavformat
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavformat.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavutil
          Description: FFmpeg utility library
          Version: 58.0.0
          Libs: -L`${libdir} -lavutil
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavutil.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswscale
          Description: FFmpeg image scaling library
          Version: 7.0.0
          Libs: -L`${libdir} -lswscale
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswscale.pc" -Encoding ASCII
          
          @"
          prefix=$workspace/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswresample
          Description: FFmpeg audio resampling library
          Version: 4.0.0
          Libs: -L`${libdir} -lswresample
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswresample.pc" -Encoding ASCII
          
          Write-Host "✅ FFmpeg setup complete"

      - name: Install pkg-config
        run: |
          Write-Host "📦 Installing pkg-config..."
          choco install pkgconfiglite -y

      - name: Build
        run: |
          Write-Host "🔨 Building NexPlayer..."
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/ffmpeg/lib/pkgconfig"
          
          mkdir build
          cd build
          
          Write-Host "Running CMake..."
          cmake -G "Visual Studio 17 2022" -A x64 ..
          
          Write-Host "Compiling..."
          cmake --build . --config Release
          
          Write-Host "✅ Build complete"

      - name: Deploy Qt and FFmpeg
        run: |
          Write-Host "📦 Deploying Qt dependencies..."
          cd build/Release
          
          $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
          
          # Run windeployqt (ignore ShaderTools warning)
          windeployqt NexPlayer.exe `
            --qmldir ../../qml `
            --qmlimport ../../qml `
            --no-translations `
            --release `
            --compiler-runtime 2>&1 | Out-String | Write-Host
          
          Write-Host "`n📋 Ensuring platform plugin exists..."
          
          # Manually copy platform plugin if missing
          if (-not (Test-Path "platforms\qwindows.dll")) {
            Write-Host "Platform plugin not deployed, copying manually..."
            New-Item -ItemType Directory -Force -Path "platforms" | Out-Null
            Copy-Item "$env:Qt6_DIR\plugins\platforms\qwindows.dll" -Destination "platforms\" -Force
            Copy-Item "$env:Qt6_DIR\plugins\platforms\qminimal.dll" -Destination "platforms\" -Force -ErrorAction SilentlyContinue
            Copy-Item "$env:Qt6_DIR\plugins\platforms\qoffscreen.dll" -Destination "platforms\" -Force -ErrorAction SilentlyContinue
          }
          
          if (-not (Test-Path "platforms\qwindows.dll")) {
            Write-Error "❌ Still missing platform plugin!"
            exit 1
          }
          Write-Host "✅ Platform plugin confirmed"
          
          # Manually copy image format plugins
          Write-Host "`nCopying image format plugins..."
          New-Item -ItemType Directory -Force -Path "imageformats" | Out-Null
          Copy-Item "$env:Qt6_DIR\plugins\imageformats\*.dll" -Destination "imageformats\" -Force -ErrorAction SilentlyContinue
          
          # Manually copy styles
          Write-Host "Copying Qt styles..."
          New-Item -ItemType Directory -Force -Path "styles" | Out-Null
          Copy-Item "$env:Qt6_DIR\plugins\styles\*.dll" -Destination "styles\" -Force -ErrorAction SilentlyContinue
          
          # Check QML modules
          Write-Host "`nChecking QML modules..."
          $qmlModules = @(
            "qml\QtQuick\Controls",
            "qml\QtQuick\Layouts"
          )
          
          foreach ($module in $qmlModules) {
            if (Test-Path "$module\qmldir") {
              Write-Host "✅ QML module: $module"
            } else {
              Write-Warning "⚠️  Missing QML module: $module"
            }
          }
          
          Write-Host "`n📦 Copying FFmpeg DLLs..."
          $ffmpegBin = "${{ github.workspace }}/ffmpeg/bin"
          Copy-Item "$ffmpegBin\*.dll" -Destination . -Force
          
          Write-Host "`n📊 Deployment summary:"
          Write-Host "Main DLLs:"
          Get-ChildItem *.dll | Select-Object Name -First 10
          
          Write-Host "`nPlatform plugins:"
          Get-ChildItem platforms\*.dll | Select-Object Name
          
          Write-Host "`n✅ Deployment complete"

      - name: Create Release Package
        run: |
          Write-Host "📦 Creating release package..."
          cd build/Release
          
          $packageName = "NexPlayer-1.0.0-Windows"
          
          New-Item -ItemType Directory -Force -Path $packageName | Out-Null
          
          Write-Host "Copying files..."
          
          Copy-Item NexPlayer.exe -Destination $packageName -Force
          Copy-Item *.dll -Destination $packageName -Force
          
          $folders = @("platforms", "qml", "QtQuick", "Qt5Compat", "styles", "imageformats")
          foreach ($folder in $folders) {
            if (Test-Path $folder) {
              Copy-Item -Recurse -Force $folder -Destination $packageName -ErrorAction SilentlyContinue
            }
          }
          
          @"
          NexPlayer v1.0.0 for Windows
          ============================
          
          INSTALLATION:
          1. Extract this ZIP file
          2. Run NexPlayer.exe
          
          REQUIREMENTS:
          - Windows 10 or later (64-bit)
          
          If "MSVCP140.dll is missing" error:
            Install Visual C++ Redistributable:
            https://aka.ms/vs/17/release/vc_redist.x64.exe
          
          TROUBLESHOOTING:
          - Keep all files together in same folder
          - Right-click NexPlayer.exe → Properties → Unblock
          
          SOURCE: https://github.com/yourusername/NexPlayer-V1
          LICENSE: MIT
          "@ | Out-File -FilePath "$packageName\README.txt" -Encoding UTF8
          
          Write-Host "`nCreating ZIP archive..."
          Compress-Archive -Path $packageName -DestinationPath "../../NexPlayer-Windows.zip" -Force
          
          $zipSize = (Get-Item "../../NexPlayer-Windows.zip").Length / 1MB
          Write-Host "`n✅ Package created: NexPlayer-Windows.zip ($("{0:N2}" -f $zipSize) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Windows
          path: NexPlayer-Windows.zip
