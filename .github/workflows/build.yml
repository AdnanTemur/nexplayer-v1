name: Build NexPlayer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt ffmpeg cmake

      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt) ..
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: |
          chmod +x scripts/deploy_macos.sh
          ./scripts/deploy_macos.sh

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-macOS
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qt6-base-dev qt6-declarative-dev qt6-multimedia-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev cmake build-essential

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create desktop file
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/nexplayer.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NexPlayer
          Comment=Modern media player with audio effects
          Exec=NexPlayer
          Icon=nexplayer
          Categories=AudioVideo;Player;
          Terminal=false
          EOF

      - name: Create icon (placeholder)
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          # Create a simple placeholder icon using ImageMagick
          sudo apt install -y imagemagick
          convert -size 256x256 xc:transparent \
            -fill "#10b981" -draw "circle 128,128 128,64" \
            -fill white -pointsize 60 -gravity center -annotate +0+0 "NP" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png

      - name: Create AppImage
        run: |
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QMAKE=/usr/lib/qt6/bin/qmake
          ./linuxdeploy-x86_64.AppImage \
            --executable=build/NexPlayer \
            --desktop-file=AppDir/usr/share/applications/nexplayer.desktop \
            --icon-file=AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png \
            --appdir=AppDir \
            --plugin=qt \
            --output=appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Linux
          path: NexPlayer-*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"
          arch: "win64_msvc2019_64"
          modules: "qtmultimedia"

      - name: Setup vcpkg cache
        uses: actions/cache@v3
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Install FFmpeg (simple method)
        run: |
          choco install ffmpeg-shared --version=7.1.0

      - name: Setup pkg-config
        run: |
          choco install pkgconfiglite

      - name: Build
        run: |
          $env:PKG_CONFIG_PATH = "C:\ProgramData\chocolatey\lib\ffmpeg-shared\tools\ffmpeg\lib\pkgconfig"
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release

      - name: Deploy
        run: |
          cd build/Release
          windeployqt NexPlayer.exe --qmldir ../../qml
          Copy-Item "C:\ProgramData\chocolatey\lib\ffmpeg-shared\tools\ffmpeg\bin\*.dll" -Destination .

      - name: Create ZIP
        run: |
          cd build/Release
          Compress-Archive -Path * -DestinationPath ../../NexPlayer-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Windows
          path: NexPlayer-Windows.zip