name: Build NexPlayer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt ffmpeg cmake

      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt) ..
          make -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: |
          chmod +x scripts/deploy_macos.sh
          ./scripts/deploy_macos.sh

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-macOS
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-multimedia-dev \
            qt6-5compat-dev \
            libqt6opengl6-dev \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-window \
            qml6-module-qt5compat-graphicaleffects \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            cmake \
            build-essential

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

      - name: Create desktop file
        run: |
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/nexplayer.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NexPlayer
          Comment=Modern media player with audio effects
          Exec=NexPlayer
          Icon=nexplayer
          Categories=AudioVideo;Player;
          Terminal=false
          EOF

      - name: Create icon
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          sudo apt install -y imagemagick
          convert -size 256x256 xc:transparent \
            -fill "#10b981" -draw "circle 128,128 128,64" \
            -fill white -pointsize 60 -gravity center -annotate +0+0 "NP" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png

      - name: Create AppImage
        run: |
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          export QML_SOURCES_PATHS=qml
          export QMAKE=/usr/lib/qt6/bin/qmake
          
          ./linuxdeploy-x86_64.AppImage \
            --executable=build/NexPlayer \
            --desktop-file=AppDir/usr/share/applications/nexplayer.desktop \
            --icon-file=AppDir/usr/share/icons/hicolor/256x256/apps/nexplayer.png \
            --appdir=AppDir \
            --plugin=qt \
            --output=appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Linux
          path: NexPlayer-*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.5.0"
          arch: "win64_msvc2019_64"
          modules: "qtmultimedia"

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Rename-Item -Path "ffmpeg-master-latest-win64-gpl-shared" -NewName "ffmpeg"
          
          New-Item -ItemType Directory -Force -Path "ffmpeg/lib/pkgconfig"
          
          @"
          prefix=${{ github.workspace }}/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavcodec
          Description: FFmpeg codec library
          Version: 60.0.0
          Libs: -L`${libdir} -lavcodec
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavcodec.pc" -Encoding ASCII
          
          @"
          prefix=${{ github.workspace }}/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavformat
          Description: FFmpeg container format library
          Version: 60.0.0
          Libs: -L`${libdir} -lavformat
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavformat.pc" -Encoding ASCII
          
          @"
          prefix=${{ github.workspace }}/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libavutil
          Description: FFmpeg utility library
          Version: 58.0.0
          Libs: -L`${libdir} -lavutil
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libavutil.pc" -Encoding ASCII
          
          @"
          prefix=${{ github.workspace }}/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswscale
          Description: FFmpeg image scaling library
          Version: 7.0.0
          Libs: -L`${libdir} -lswscale
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswscale.pc" -Encoding ASCII
          
          @"
          prefix=${{ github.workspace }}/ffmpeg
          exec_prefix=`${prefix}
          libdir=`${exec_prefix}/lib
          includedir=`${prefix}/include
          
          Name: libswresample
          Description: FFmpeg audio resampling library
          Version: 4.0.0
          Libs: -L`${libdir} -lswresample
          Cflags: -I`${includedir}
          "@ | Out-File -FilePath "ffmpeg/lib/pkgconfig/libswresample.pc" -Encoding ASCII

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Build
        run: |
          $env:PKG_CONFIG_PATH = "${{ github.workspace }}/ffmpeg/lib/pkgconfig"
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release

      - name: Deploy
            run: |
              cd build/Release
              
              $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
              windeployqt NexPlayer.exe `
                --qmldir ../../qml `
                --qmlimport ../../qml `
                --no-translations `
                --release `
                --compiler-runtime
              
              $requiredFiles = @(
                "platforms\qwindows.dll",
                "qml\QtQuick\Controls\qmldir",
                "qml\QtQuick\Layouts\qmldir",
                "qml\Qt5Compat\GraphicalEffects\qmldir"
              )
              
              foreach ($file in $requiredFiles) {
                if (-not (Test-Path $file)) {
                  Write-Error "Missing: $file"
                  exit 1
                }
              }
              
              Write-Host "Copying FFmpeg DLLs..."
              Copy-Item "${{ github.workspace }}/ffmpeg/bin/*.dll" -Destination . -Force
              
              Write-Host "`nDeployment successful!"

      - name: Create ZIP
        run: |
          cd build/Release
          Compress-Archive -Path * -DestinationPath ../../NexPlayer-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexPlayer-Windows
          path: NexPlayer-Windows.zip